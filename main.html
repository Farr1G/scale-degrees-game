<!DOCTYPE html>
<html>
    <head>
        <title>Scale Degrees Game</title>
        <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <section id="configuration-screen">
            <h1>Configuration</h1>
            <fieldset id="scale-fieldset">
                <legend>Scale</legend>
                <div class="radio">
                    <input type="radio" value="major" name="scale-radio" checked>
                    <label>Major</label>
                </div>
                <div class="radio">
                    <input type="radio" value="minor" name="scale-radio">
                    <label>Minor</label>
                </div>
                <div class="radio">
                    <input type="radio" value="mixed" name="scale-radio">
                    <label>Mixed</label>
                </div>
            </fieldset>
            <fieldset id="game-mode-fieldset">
                <legend>Game mode</legend>
                <div class="radio">
                    <input type="radio" value="questions" name="game-mode-radio" checked>
                    <label>Until 20 questions</label>
                </div>
                <div class="radio">
                    <input type="radio" value="errors" name="game-mode-radio">
                    <label>Until 5 errors</label>
                </div>
                <div class="radio">
                    <input type="radio" value="tired" name="game-mode-radio">
                    <label>Until I'm tired</label>
                </div>
            </fieldset>
            <button id="start-round-button">Start round</button>
        </section>
        <!-- TODO: find a place for the attempt counter -->
        <section id="questions-screen" hidden>
            <h1>Question <span id="question-index-span">1</span></h1>
            <div>
                <p>What's the <span id="scale-degree-span">2</span> scale degree in <span id="root-note-span">A</span> <span id="scale-span">major</span>?</p>
                <input type="text" id="guess-field" autocomplete="off">
                <button id="check-guess-button">Check</button>
            </div>
            <p id="result-paragraph" hidden>Completely wrong. The answer was B</p>
            <button id="stop-round-button">Stop</button>
        </section>
        <section id="statistic-screen" hidden>
            <h1>Statistic</h1>
            <p>Rounds: <span id="rounds-amount-span">20</span></p>
            <p>Accuracy: <span id="accuracy-span">64</span>%</p>
            <button id="another-round-button">Take another round</button>
        </section>
        <script src="script.js"></script>
    </body>
</html>
