<!DOCTYPE html>
<html>
    <head>
        <title>Scale Degrees Game</title>
        <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <section id="configuration-screen">
            <h1>Configuration</h1>
            <form>
                <fieldset id="scale-fieldset">
                    <legend>Scale</legend>
                    <div class="radio">
                        <input type="radio" value="major" name="scale-radio" checked>
                        <label for="major-scales-radio">Major</label>
                    </div>
                    <div class="radio">
                        <input type="radio" value="minor" name="scale-radio">
                        <label for="minor-scales-radio">Minor</label>
                    </div>
                    <div class="radio">
                        <input type="radio" value="mixed" name="scale-radio">
                        <label for="mixed-scales-radio">Mixed</label>
                    </div>
                </fieldset>
                <fieldset id="game-mode-fieldset">
                    <legend>Game mode</legend>
                    <div class="radio">
                        <input type="radio" value="questions" name="game-mode-radio" checked>
                        <label for="20q-game-mode-radio">Until 20 questions</label>
                    </div>
                    <div class="radio">
                        <input type="radio" value="errors" name="game-mode-radio">
                        <label for="5err-game-mode-radio">Until 5 errors</label>
                    </div>
                    <div class="radio">
                        <input type="radio" value="tired" name="game-mode-radio">
                        <label for="tired-game-mode-radio">Until I'm tired</label>
                    </div>
                </fieldset>
            </form>
            <button id="start-round-button">Start round</button>
        </section>
        <!-- TODO: find a place for the attempt counter -->
        <section id="questions-screen" hidden>
            <h1 id="question-counter">Question 1</h1>
            <!-- TODO: define form's behaviour after sending -->
            <form>
                <label id="query-text">What's the 2nd scale degree in A major?</label>
                <input type="text" name="guess-field">
                <button id="check-guess-button">Check</button>
            </form>
            <p id="result-text">Completely wrong. The answer was B</p>
            <button id="stop-round-button">Stop</button>
        </section>
        <section id="statistic-screen" hidden>
            <h1>Statistic</h1>
            <p>Rounds: 20</p>
            <p>Accuracy: 64%</p>
            <button id="another-round-button">Take another round</button>
        </section>
        <script src="script.js"></script>
    </body>
</html>
