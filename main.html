<!DOCTYPE html>
<html>
    <head>
        <title>Scale Degrees Game</title>
        <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <div id="configuration-screen">
            <h1>Configuration</h1>
            <form>
                <fieldset>
                    <legend>Scale</legend>
                    <div class="radio">
                        <input type="radio" id="major-scales-radio" name="scale-radio" checked>
                        <label for="major-scales-radio">major</label>
                    </div>
                    <div class="radio">
                        <input type="radio" id="minor-scales-radio" name="scale-radio">
                        <label for="minor-scales-radio">minor</label>
                    </div>
                    <div class="radio">
                        <input type="radio" id="mixed-scales-radio" name="scale-radio">
                        <label for="mixed-scales-radio">mixed</label>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Game mode</legend>
                    <div class="radio">
                        <input type="radio" id="20q-gm-radio" name="gm-radio" checked>
                        <label for="20q-gm-radio">until 20 questions</label>
                    </div>
                    <div class="radio">
                        <input type="radio" id="5err-gm-radio" name="gm-radio">
                        <label for="5err-gm-radio">until 5 errors</label>
                    </div>
                    <div class="radio">
                        <input type="radio" id="tired-gm-radio" name="gm-radio">
                        <label for="tired-gm-radio">until I'm tired</label>
                    </div>
                </fieldset>
            </form>
            <button id="start-round-button">Start round</button>
        </div>
        <div id="questions-screen">
            
        </div>
        <div id="statistic-screen">
            <h1>Statistic</h1>
            <p>Rounds: </p>
            <p>Accuracy: </p>
            <button id="another-round-button">Take another round</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
